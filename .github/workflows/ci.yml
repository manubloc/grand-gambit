# Runs the full deterministic test suite (220 checks), builds both release
# artifacts, and boots the single-file build in a sandboxed DOM.
name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run build:single
      - run: node scripts/verify-boot.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: grand-gambit-web
          path: dist/
      - uses: actions/upload-artifact@v4
        with:
          name: grand-gambit-singlefile
          path: dist-single/index.html
