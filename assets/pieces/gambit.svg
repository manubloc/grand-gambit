<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 0 36 42" data-gg="piece:GAMBIT">
<!-- THE GRAND GAMBIT — the one figure that had no silhouette of its own and
     borrowed the pawn's, because it shares the pawn's kind. A pawn that kept
     walking: the same round head and the same collar, but the shoulders widen
     into a cloak and a blade rises at its back — a foot soldier already half a
     champion. Holes (evenodd) keep the collar slit and the blade's fuller. -->
